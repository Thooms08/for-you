<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Love You Jasmine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
    <meta property="og:title" content="I LOVE YOU JASMINE">
    <meta property="og:description" content="Ungkapan tulus dari lubuk hati yang paling dalam.">
    <meta property="og:image" content="assets/logo.jpg">
    <meta property="og:url" content="https://for-jasmine.netlify.app/love.html">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/jpeg" href="assets/logo.jpg">
</head>
<body class="page-love min-h-screen flex flex-col items-center justify-center relative select-none">
    
    <div id="stars-container" class="absolute inset-0 pointer-events-none z-0 overflow-hidden"></div>
    
    <div id="heart-container" class="absolute inset-0 pointer-events-none z-0 overflow-hidden"></div>

    <audio id="bg-music" src="assets/audio.mp3" loop autoplay preload="auto"></audio>

    <div class="z-10 text-center px-4">
        <h1 class="text-3xl sm:text-4xl md:text-6xl lg:text-7xl font-black animate-wind-in animate-text-gradient-love tracking-wide drop-shadow-md mb-4 md:mb-6 leading-tight">
            I LOVE YOU JASMINE
        </h1>
        
        <p class="text-gray-500 text-sm md:text-base animate-fade-in delay-1000 italic">
            Thank you for being you. <i class="fa-solid fa-heart text-red-400"></i>
        </p>
    </div>

    <footer class="site-footer">by <i class="fa-solid fa-heart"></i> Thomas</footer>

    <script src="script.js"></script>
</body>
</html>
